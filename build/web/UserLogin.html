<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlete Login</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #01236d, #3861e7);
    min-height: 100vh;
}
.formatlogin {
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 30px 15px;
}
.logo {
    font-weight: bold;
    font-size: 30px;
    color: white;
    margin-bottom: 20px;
    text-align: center;
    display: flex;
    align-items: center;
    gap: 10px;
}
.logo .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #2d6cdf;
    background: white;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    font-size: 18px;
    font-weight: bold;
}
.hdr {
    font-size: 34px;
    font-weight: bold;
    color: white;
    margin-bottom: 10px;
    text-align: center;
}
.subhdr {
    font-size: 16px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 28px;
    text-align: center;
}
.formatform {
    background: white;
    width: 100%;
    max-width: 430px;
    padding: 35px 30px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}
.formatform h1 {
    text-align: center;
    margin-bottom: 24px;
    font-size: 24px;
    color: #222;
}
.formatform label {
    font-weight: bold;
    font-size: 14px;
    color: #333;
    display: block;
    margin-bottom: 6px;
    margin-top: 14px;
}
.mobile-wrap {
    display: flex;
    align-items: center;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    overflow: hidden;
    background: #fafafa;
}
.mobile-prefix {
    padding: 12px 14px;
    background: #f1f5f9;
    color: #374151;
    font-size: 14px;
    font-weight: bold;
    border-right: 1px solid #d0d0d0;
    white-space: nowrap;
}
.mobile-wrap input {
    border: none;
    outline: none;
    padding: 12px;
    font-size: 14px;
    width: 100%;
    background: #fafafa;
    letter-spacing: 1px;
}
.mobile-wrap input:focus {
    box-shadow: none;
}
.hint {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 6px;
    display: block;
}
.cardbtn {
    width: 100%;
    background: #2d6cdf;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    margin-top: 24px;
    cursor: pointer;
    transition: 0.3s;
}
.cardbtn:hover {
    background: #1d56c4;
}
.footer-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 18px;
    font-size: 13px;
    color: #64748b;
}
.footer-links a {
    color: #2d6cdf;
    text-decoration: none;
    font-weight: bold;
}
.footer-links a:hover {
    text-decoration: underline;
}
/* ERROR MESSAGE */
.error-msg {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
    display: none;
}
</style>
</head>
<body>

<div class="formatlogin">

    <div class="logo">
        <span class="icon">SE</span> SportsEcosystem
    </div>

    <div class="hdr">Athlete Portal</div>
    <div class="subhdr">Sign in with your registered mobile number.</div>

    <form name="frm" method="post" action="UserLoginServlet" class="formatform">

        <h1>Login</h1>

        <!-- ERROR BOX — shown via URL param -->
        <div class="error-msg" id="errBox">
            Mobile number not found. Please check and try again.
        </div>

        <label>Registered Mobile Number</label>
        <div class="mobile-wrap">
            <span class="mobile-prefix">+91</span>
            <input
                type="tel"
                name="mobile"
                placeholder="Enter 10-digit mobile"
                maxlength="10"
                pattern="[0-9]{10}"
                required
                autofocus
            >
        </div>
        <span class="hint">Enter the mobile number you used during registration.</span>

        <input type="submit" value="Sign In to Dashboard" class="cardbtn">

        <div class="footer-links">
            <span>New here? <a href="athleteRegistration.html">Register</a></span>
            <span><a href="index.html">← Home</a></span>
        </div>

    </form>

</div>

</body>
</html>
