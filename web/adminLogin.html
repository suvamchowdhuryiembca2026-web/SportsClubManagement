<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal</title>

<link rel="stylesheet" href="style02.css">
</head>

<body>

<div class="formatlogin">

    <div class="logo">
        <span class="icon">SE</span> SportsEcosystem
    </div>

    <div class="hdr">
        Admin Portal
    </div>

    <div class="subhdr">
        Sign in to manage users and approvals.
    </div>

    <form name="frm" method="post" action="adminLoginServlet" class="formatform">

        <h1>Login</h1>

        <p>Admin Username</p>
        <input type="text" placeholder="admin" name="username">

        <p>Password</p>
        <input type="password" placeholder="Enter your password" name="password">

        <input type="submit" value="Sign In to Dashboard" class="cardbtn">

        <p class="formatFooter">
            Forgot password?
        </p>

    </form>

</div>

</body>
</html>
